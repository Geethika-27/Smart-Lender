<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender - Loan Eligibility Form</title>
    <meta name="description" content="Enter applicant details to predict loan eligibility.">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent sticky-top soft-blur">
        <div class="container">
            <a class="navbar-brand fw-bold text-gradient" href="/">Smart Lender</a>
            <div class="d-flex gap-2">
                <button id="themeToggle" class="btn btn-outline-light btn-sm rounded-pill px-3 theme-toggle-btn" type="button">🌙 Dark</button>
                <a href="/#highlights" class="btn btn-glow btn-sm rounded-pill px-3">Explore Features</a>
                <a href="/" class="btn btn-outline-light btn-sm rounded-pill px-3">Home</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="glass-card max-width-form mx-auto p-5 animate-fade-in">
            <h2 class="text-center mb-4 text-white fw-bold">Applicant Details</h2>

            <div class="row g-3 mb-4">
                <div class="col-12">
                    <label class="form-label text-light">Form Completion</label>
                    <div class="progress progress-soft" role="progressbar" aria-label="Form completion" aria-valuemin="0" aria-valuemax="100">
                        <div id="formProgressBar" class="progress-bar" style="width: 0%">0%</div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="scenario-panel">
                        <span class="text-light small d-block mb-2">Quick Scenario Presets</span>
                        <div class="d-flex flex-wrap gap-2">
                            <button type="button" class="btn btn-sm btn-outline-info rounded-pill preset-btn" data-preset="low">Scenario 1: Low Risk</button>
                            <button type="button" class="btn btn-sm btn-outline-warning rounded-pill preset-btn" data-preset="high">Scenario 2: High Risk</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill preset-btn" data-preset="clear">Clear</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="metric-tile">
                        <p class="mb-1 small text-light">Estimated Loan Burden</p>
                        <h5 id="burdenMeter" class="mb-0 text-gradient-accent">N/A</h5>
                    </div>
                </div>
            </div>

            <form action="/submit" method="POST" id="loanForm" class="needs-validation" novalidate>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="Gender" class="form-label text-light">Gender</label>
                        <select class="form-select bg-dark text-white border-secondary" id="Gender" name="Gender" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="Married" class="form-label text-light">Married Status</label>
                        <select class="form-select bg-dark text-white border-secondary" id="Married" name="Married" required>
                            <option value="" disabled selected>Select Status</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="Dependents" class="form-label text-light">Dependents</label>
                        <select class="form-select bg-dark text-white border-secondary" id="Dependents" name="Dependents" required>
                            <option value="" disabled selected>Select Dependents</option>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3+</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="Education" class="form-label text-light">Education</label>
                        <select class="form-select bg-dark text-white border-secondary" id="Education" name="Education" required>
                            <option value="" disabled selected>Select Education</option>
                            <option value="0">Graduate</option>
                            <option value="1">Not Graduate</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="Self_Employed" class="form-label text-light">Self Employed</label>
                        <select class="form-select bg-dark text-white border-secondary" id="Self_Employed" name="Self_Employed" required>
                            <option value="" disabled selected>Select Self Employed</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="Property_Area" class="form-label text-light">Property Area</label>
                        <select class="form-select bg-dark text-white border-secondary" id="Property_Area" name="Property_Area" required>
                            <option value="" disabled selected>Select Property Area</option>
                            <option value="2">Urban</option>
                            <option value="1">Semiurban</option>
                            <option value="0">Rural</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="ApplicantIncome" class="form-label text-light">Applicant Income ($)</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary" id="ApplicantIncome" name="ApplicantIncome" min="0" required placeholder="e.g. 5000">
                    </div>
                    <div class="col-md-6">
                        <label for="CoapplicantIncome" class="form-label text-light">Coapplicant Income ($)</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary" id="CoapplicantIncome" name="CoapplicantIncome" min="0" required placeholder="e.g. 1500">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="LoanAmount" class="form-label text-light">Loan Amount (in Thousands $)</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary" id="LoanAmount" name="LoanAmount" min="0" required placeholder="e.g. 120 (for $120,000)">
                    </div>
                    <div class="col-md-6">
                        <label for="Loan_Amount_Term" class="form-label text-light">Loan Amount Term (in Days)</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary" id="Loan_Amount_Term" name="Loan_Amount_Term" min="0" required placeholder="e.g. 360">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="Credit_History" class="form-label text-light">Credit History</label>
                    <select class="form-select bg-dark text-white border-secondary" id="Credit_History" name="Credit_History" required>
                        <option value="" disabled selected>Select Credit History</option>
                        <option value="1.0">Good Credit Record (1.0)</option>
                        <option value="0.0">No/Poor Credit Record (0.0)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <div id="liveHint" class="live-hint">Fill all required fields to enable a high-confidence prediction.</div>
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-glow py-3 rounded-pill flex-grow-1">Submit Prediction</button>
                    <button type="button" id="saveDraftBtn" class="btn btn-outline-light py-3 rounded-pill">Save Draft</button>
                    <button type="button" id="loadDraftBtn" class="btn btn-outline-light py-3 rounded-pill">Load Draft</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
